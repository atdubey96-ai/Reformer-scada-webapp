<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reformer SCADA</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="0; url=/webapp/">
  <script>
    (function(){
      var target = "/webapp/";
      if (location.pathname !== target) {
        location.replace(target);
      }
    })();
  </script>
  <style>
    html,body{height:100%;margin:0;background:#0f1115;color:#e5e7eb;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    .wrap{height:100%;display:grid;place-items:center;padding:24px;text-align:center;}
    a{color:#93c5fd;}
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      Redirecting to dashboard...<br>
      If not redirected, open <a href="/webapp/">/webapp/</a>.
    </div>
  </div>
</body>
</html>
